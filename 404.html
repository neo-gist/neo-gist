<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<title>Redirecting…</title>
<!--
  GitHub Pages SPA 리다이렉트.
  /research 같은 실제 파일이 없는 주소로 직접 접속·새로고침하면 GitHub 이 이 404 를 보여줌.
  여기서 주소를 /?/research 형태로 바꿔 index.html 로 넘기면, index.html 의 head 스크립트가
  다시 원래 주소(/research)로 되돌리고 site.js 가 해당 화면을 띄움.
  pathSegmentsToKeep = 1  →  프로젝트 페이지(/neo-gist/) 이므로 앞의 한 칸(/neo-gist)은 그대로 둠.
  (나중에 커스텀 도메인을 붙여 루트(/)에서 서비스하면 이 값을 0 으로 바꾸면 됨)
-->
<script>
  var pathSegmentsToKeep = 1;
  var l = window.location;
  l.replace(
    l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
    l.pathname.split('/').slice(0, 1 + pathSegmentsToKeep).join('/') + '/?/' +
    l.pathname.slice(1).split('/').slice(pathSegmentsToKeep).join('/').replace(/&/g, '~and~') +
    (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
    l.hash
  );
</script>
</head>
<body></body>
</html>
